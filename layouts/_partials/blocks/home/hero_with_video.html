<section id="hero">
    <div class="content-center relative overflow-hidden z-0 h-[25vh] md:h-108 lg:h-145 xl:h-175 bg-black">
      <div class="absolute object-[50%_50%] -translate-y-1/2 left-1/20 ">
          <h1 class="text-secondary font-outline-white md:mb-3">Veteran-Owned.</h1>
          <h1 class="text-white font-outline-black md:mb-3">Texas Proud.</h1>
          <h1 class="text-primary font-outline-white">Quality You Can See.</h1>
      </div>
        {{ with .video }}
          {{ partial "utilities/stylable_video.html" (dict "src" . "class" "absolute inset-0 z-[-1] object-[50%_50%] w-full h-full object-cover") }}
        {{ end }}
    </div>
    <div class="flex h-[8vh] md:h-[10vh] bg-tertiary/20 justify-center items-center text-center z-10">
        <h5 class="text-primary font-outline-white mx-2">Proudly serving Katy, Cypress, Sugar Land, Houston and surrounding areas.</h5>
    </div>
</section>
