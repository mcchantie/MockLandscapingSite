<div class="relative z-10 h-full flex flex-col justify-center text-center lg:text-left">
    {{ with .title }}
    <h2 class="text-white mb-6">
        {{ . }}
    </h2>
    {{ end }}

    <div class="space-y-5 max-w-2xl mx-auto lg:mx-0">
        {{ range .text }}
        <p class="text-white/90 text-base md:text-lg leading-8 font-medium">
            {{ . }}
        </p>
        {{ end }}
    </div>
</div>
