<div class="dropdown-container" data-dropdown>
    <a class="dropdown-trigger" href="{{.href}}" aria-expanded="false" aria-haspopup="true">
        {{ .label }}
        <svg class="dropdown-arrow" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </a>

    <div class="dropdown-menu" role="menu">
        {{ range .items }}
        <a href="{{ .href }}" class="dropdown-item" role="menuitem">
            {{ .name }}
        </a>
        {{ end }}
    </div>
</div>
